<div class="container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Notas Fiscais Emitidas</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <div *ngIf="carregando" class="loading">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <table mat-table [dataSource]="notas" class="mat-elevation-z2" *ngIf="!carregando">

        <ng-container matColumnDef="numeroSequencial">
          <th mat-header-cell *matHeaderCellDef> Nº Nota </th>
          <td mat-cell *matCellDef="let nota"> <strong>#{{nota.numeroSequencial}}</strong> </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef> Status </th>
          <td mat-cell *matCellDef="let nota">
            <mat-chip [color]="nota.status === 'Aberta' ? 'primary' : 'accent'" highlighted>
              {{ nota.status }}
            </mat-chip>
          </td>
        </ng-container>

        <ng-container matColumnDef="dataCriacao">
          <th mat-header-cell *matHeaderCellDef> Data </th>
          <td mat-cell *matCellDef="let nota"> {{ nota.dataCriacao | date:'dd/MM/yyyy HH:mm' }} </td>
        </ng-container>

        <ng-container matColumnDef="itens">
          <th mat-header-cell *matHeaderCellDef> Itens </th>
          <td mat-cell *matCellDef="let nota"> {{ nota.itens.length }} produto(s) </td>
        </ng-container>

        <ng-container matColumnDef="acoes">
          <th mat-header-cell *matHeaderCellDef> Ações </th>
          <td mat-cell *matCellDef="let nota">
            <button mat-raised-button color="warn"
                    [disabled]="nota.status !== 'Aberta' || imprimindo === nota.id"
                    (click)="imprimir(nota)">
              <mat-spinner *ngIf="imprimindo === nota.id" diameter="20"></mat-spinner>
              <mat-icon *ngIf="imprimindo !== nota.id">print</mat-icon>
              {{ imprimindo === nota.id ? 'Imprimindo...' : 'Imprimir' }}
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="colunas"></tr>
        <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
      </table>

      <p *ngIf="!carregando && notas.length === 0">Nenhuma nota emitida ainda.</p>
    </mat-card-content>
  </mat-card>
</div>
